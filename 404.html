<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

</head>
<body>

    <style>

    @keyframes cube {
        from {
            transform: scale(0) rotate(0deg) translate(-50%, -50%);
            opacity: 1;
        }
        to {
            transform: scale(20) rotate(960deg) translate(-50%, -50%);
            opacity: 0;

        }
    }

    .background {
        position: fixed;
        width: 100vw;
        height: 100vh;
        top: 0;
        left: 0;
        margin: 0;
        padding: 0;
        background: #8eaff0;
        overflow: hidden;
    }
    .background li {
        position: absolute;
        top: 80vh;
        left: 45vw;
        width: 10px;
        height: 10px;
        border: solid 1px #7f9dd8;
        color: transparent;
        transform-origin: top left;
        transform: scale(0) rotate(0deg) translate(-50%, -50%);
        animation: cube 18s ease-in forwards infinite;
    }
    
    .background li:nth-child(0) {
        animation-delay: 0s;
        left: 22vw;
        top: 40vh;
    }

    .background li:nth-child(1) {
        animation-delay: 2s;
        left: 57vw;
        top: 28vh;
    }

    .background li:nth-child(2) {
        animation-delay: 4s;
        left: 48vw;
        top: 9vh;
    }

    .background li:nth-child(3) {
        animation-delay: 6s;
        left: 96vw;
        top: 50vh;
    }

    .background li:nth-child(4) {
        animation-delay: 8s;
        left: 80vw;
        top: 99vh;
    }

    .background li:nth-child(5) {
        animation-delay: 10s;
        left: 13vw;
        top: 69vh;
        border-color: #9cc0ff;
    }


    </style>

    <div class="absolute">
        <ul class="background">
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
        </ul>
    </div>
    

    <div class="absolute w-full h-screen flex items-center justify-center">
        <img width="300px" height="300px" src="resources/Images/Pictures/404_k_optimized.png" alt="404_not_found">
      <span class="text-2xl font-bold">404 - Not Found</span>
    </div>
    
    <script src="resources/javascript/tailwind.js"></script>
    
</body>
</html>
